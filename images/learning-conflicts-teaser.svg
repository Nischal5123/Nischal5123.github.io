<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">Learning with conflicts of interest diagram</title>
  <desc id="desc">A user and an ML system have different objectives, with a safeguard layer reducing biased actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#eef5f2"/>
    </linearGradient>
    <marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6f73"/>
    </marker>
    <marker id="warnArrow" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b6562b"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="24" fill="url(#bg)"/>
  <rect x="54" y="52" width="692" height="376" rx="22" fill="#ffffff" stroke="#d7e3e4" stroke-width="2"/>
  <circle cx="170" cy="166" r="42" fill="#dceff4" stroke="#3f7f8a" stroke-width="3"/>
  <circle cx="170" cy="143" r="16" fill="#3f7f8a"/>
  <path d="M132 196c14-26 62-26 76 0" fill="#3f7f8a"/>
  <text x="170" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#24474c">User</text>
  <text x="170" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#52666a">needs useful actions</text>

  <rect x="548" y="112" width="116" height="98" rx="18" fill="#f6e7d7" stroke="#b6562b" stroke-width="3"/>
  <rect x="578" y="84" width="56" height="34" rx="10" fill="#b6562b"/>
  <circle cx="578" cy="212" r="10" fill="#b6562b"/>
  <circle cx="634" cy="212" r="10" fill="#b6562b"/>
  <path d="M580 150h52M580 174h52" stroke="#b6562b" stroke-width="8" stroke-linecap="round"/>
  <text x="606" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#6f381f">ML System</text>
  <text x="606" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#76594a">optimizes its own goal</text>

  <path d="M230 164 C320 94 460 94 548 164" fill="none" stroke="#b6562b" stroke-width="5" stroke-dasharray="10 10" marker-end="url(#warnArrow)"/>
  <text x="390" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b6562b">misaligned incentives</text>

  <path d="M548 202 C456 296 320 296 226 202" fill="none" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="390" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2f6f73">desired information and actions</text>

  <rect x="287" y="176" width="226" height="78" rx="18" fill="#eef7f3" stroke="#2f6f73" stroke-width="3"/>
  <text x="400" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#24575a">Safeguard Algorithm</text>
  <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#51686a">limits biased or manipulative actions</text>

  <rect x="116" y="352" width="568" height="34" rx="17" fill="#f4f7f7" stroke="#d7e3e4"/>
  <text x="400" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#43585b">Learning under conflicts of interest</text>
</svg>
