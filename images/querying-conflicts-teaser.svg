<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">Querying with conflicts of interest diagram</title>
  <desc id="desc">A query flows to a biased data source, then through bias detection and query reformulation to recover relevant results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fff6ee"/>
    </linearGradient>
    <marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2b6777"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="24" fill="url(#bg)"/>
  <rect x="54" y="54" width="692" height="372" rx="22" fill="#ffffff" stroke="#dde3e8" stroke-width="2"/>

  <rect x="92" y="134" width="148" height="76" rx="16" fill="#e6f1f5" stroke="#2b6777" stroke-width="3"/>
  <text x="166" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#214f5d">User Query</text>
  <text x="166" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#52707a">information need</text>

  <rect x="336" y="92" width="150" height="160" rx="18" fill="#fff0e3" stroke="#b66230" stroke-width="3"/>
  <path d="M366 132h90M366 162h90M366 192h54" stroke="#b66230" stroke-width="10" stroke-linecap="round"/>
  <text x="411" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#6e3e23">Biased Source</text>
  <text x="411" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#765c4d">conflicting incentives</text>

  <path d="M240 172H326" fill="none" stroke="#2b6777" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M486 172H570" fill="none" stroke="#b66230" stroke-width="5" stroke-dasharray="9 9" marker-end="url(#arrow)"/>

  <rect x="574" y="132" width="136" height="86" rx="16" fill="#fff8f2" stroke="#b66230" stroke-width="2"/>
  <text x="642" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6e3e23">Answers</text>
  <text x="642" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#765c4d">possibly skewed</text>

  <rect x="160" y="332" width="186" height="62" rx="16" fill="#eff8f3" stroke="#2e7b57" stroke-width="3"/>
  <text x="253" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#285a43">Bias Detection</text>
  <text x="253" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#536b60">find conflict signal</text>

  <rect x="454" y="332" width="186" height="62" rx="16" fill="#eff8f3" stroke="#2e7b57" stroke-width="3"/>
  <text x="547" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#285a43">Reformulation</text>
  <text x="547" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#536b60">recover relevance</text>

  <path d="M642 218 C610 294 380 296 253 332" fill="none" stroke="#2e7b57" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M346 363H444" fill="none" stroke="#2e7b57" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M547 332 C532 278 318 278 166 210" fill="none" stroke="#2e7b57" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
